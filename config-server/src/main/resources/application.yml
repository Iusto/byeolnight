server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:file:///opt/byeolnight/config-repo}
          default-label: main
          search-paths: configs
        encrypt:
          enabled: true
  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:config-admin}
      password: ${SPRING_SECURITY_USER_PASSWORD:config-secret-2024}

encrypt:
  key: ${ENCRYPT_KEY:byeolnight-config-encryption-key-2024}

management:
  endpoints:
    web:
      exposure:
        include: health,info