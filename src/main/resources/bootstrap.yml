spring:
  application:
    name: byeolnight
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cloud:
    config:
      uri: ${CONFIG_SERVER_URI:http://localhost:8888}
      username: ${CONFIG_USERNAME:config-admin}
      password: ${CONFIG_PASSWORD:config-secret-2024}
      fail-fast: true
      retry:
        initial-interval: 1000
        max-attempts: 6