spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        
  h2:
    console:
      enabled: true

jwt:
  secret: testSecretKeyForJwtTokenTesting123456789012345678901234567890
  access-token-validity: 30m
  refresh-token-validity: 7d
  allowed-clock-skew: 30s

logging:
  level:
    com.byeolnight: DEBUG
    org.springframework.security: DEBUG