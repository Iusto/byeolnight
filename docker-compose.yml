# Docker Compose 설정 파일 (HTTPS 지원)

services:
  config-server:
    image: ghcr.io/iusto/byeolnight-config-server:latest
    ports:
      - "8888:8888"
    environment:
      - ENCRYPT_KEY=byeolnight-config-encryption-key-2024
      - SPRING_SECURITY_USER_NAME=config-admin
      - SPRING_SECURITY_USER_PASSWORD=config-secret-2024
      - SPRING_PROFILES_ACTIVE=prod
      - CONFIG_GIT_URI=file:///opt/byeolnight/config-repo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - app
      - frontend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    profiles: ["cert"]

  app:
    build: .
    depends_on:
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - JAVA_OPTS=-Xmx1g -Xms512m -XX:+UseG1GC -XX:MaxMetaspaceSize=256m
      - TZ=Asia/Seoul
      - CONFIG_SERVER_URI=http://config-server:8888
      - CONFIG_USERNAME=config-admin
      - CONFIG_PASSWORD=config-secret-2024
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: byeolnight9703!@
      MYSQL_DATABASE: byeolnight
      TZ: Asia/Seoul
    command: >
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --max-connections=50
      --innodb-flush-log-at-trx-commit=2
      --default-time-zone='+09:00'
    ports:
      - "3306:3306"  # 외부 접근을 위해 포트 노출
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --requirepass byeolnight_redis_2025!@ --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

  frontend:
    build:
      context: ./byeolnight-frontend
      args:
        VITE_API_BASE_URL: https://byeolnight.com/api
        VITE_WS_URL: https://byeolnight.com/ws
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
