# 운영 배포용
# 사용법: docker-compose up -d

services:
  config-server:
    build:
      context: ./config-server
    ports:
      - "8888:8888"
    environment:
      - ENCRYPT_KEY=${ENCRYPT_KEY:-byeolnight-config-encryption-key-2024}
      - SPRING_SECURITY_USER_NAME=${CONFIG_USERNAME:-config-admin}
      - SPRING_SECURITY_USER_PASSWORD=${CONFIG_PASSWORD:-config-secret-2024}
      - SPRING_PROFILES_ACTIVE=prod
      # Git Repository 사용 (운영 환경)
      - CONFIG_GIT_URI=${CONFIG_GIT_URI:-file:///opt/byeolnight/config-repo}
      - CONFIG_GIT_USERNAME=${CONFIG_GIT_USERNAME:-}
      - CONFIG_GIT_PASSWORD=${CONFIG_GIT_PASSWORD:-}
    volumes:
      - ./config-repo:/opt/byeolnight/config-repo:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--http-user=${CONFIG_USERNAME:-config-admin}", "--http-password=${CONFIG_PASSWORD:-config-secret-2024}", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - byeolnight-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - app
      - frontend
    restart: unless-stopped
    networks:
      - byeolnight-network

  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    profiles: ["cert"]

  app:
    build: .
    depends_on:
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - JAVA_OPTS=-Xmx1g -Xms512m -XX:+UseG1GC -XX:MaxMetaspaceSize=256m
      - TZ=Asia/Seoul
      - CONFIG_SERVER_URI=http://config-server:8888
      - CONFIG_USERNAME=${CONFIG_USERNAME:-config-admin}
      - CONFIG_PASSWORD=${CONFIG_PASSWORD:-config-secret-2024}
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    networks:
      - byeolnight-network

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-byeolnight9703!@}
      MYSQL_DATABASE: byeolnight
      TZ: Asia/Seoul
    command: >
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --max-connections=50
      --innodb-flush-log-at-trx-commit=2
      --default-time-zone='+09:00'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - byeolnight-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-byeolnight_redis_2025!@} --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    networks:
      - byeolnight-network

  frontend:
    build:
      context: ./byeolnight-frontend
      args:
        VITE_API_BASE_URL: https://byeolnight.com/api
        VITE_WS_URL: https://byeolnight.com/ws
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - byeolnight-network

volumes:
  mysql_data:
  redis_data:

networks:
  byeolnight-network:
    driver: bridge
